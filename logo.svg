<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 200" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <style>
      .line { stroke: #008AA6; stroke-width: 2.5; fill: none; }
      .node { fill: #00D4FF; filter: url(#glow); }
      .title { font-family: 'Montserrat', 'Segoe UI', 'Arial', sans-serif; font-weight: 800; font-size: 78px; fill: #005A7A; letter-spacing: 2px;}
      .subtitle { font-family: 'Montserrat', 'Segoe UI', 'Arial', sans-serif; font-weight: 300; font-size: 48px; fill: #1A3B4D; letter-spacing: 1px;}
    </style>
  </defs>

  <g transform="translate(30, 10)">
    <polygon points="100,20 20,160 180,160" class="line" />
    
    <polygon points="100,65 55,120 145,120" class="line" />
    <line x1="100" y1="20" x2="100" y2="65" class="line" />
    <line x1="20" y1="160" x2="55" y2="120" class="line" />
    <line x1="180" y1="160" x2="145" y2="120" class="line" />
    <line x1="100" y1="65" x2="100" y2="105" class="line" />
    
    <line x1="100" y1="105" x2="20" y2="160" class="line" />
    <line x1="100" y1="105" x2="180" y2="160" class="line" />
    <line x1="100" y1="105" x2="100" y2="160" class="line" />
    <line x1="55" y1="120" x2="100" y2="160" class="line" />
    <line x1="145" y1="120" x2="100" y2="160" class="line" />
    
    <circle cx="100" cy="20" r="5" class="node" />
    <circle cx="20" cy="160" r="5" class="node" />
    <circle cx="180" cy="160" r="5" class="node" />
    <circle cx="100" cy="65" r="4.5" class="node" />
    <circle cx="55" cy="120" r="4.5" class="node" />
    <circle cx="145" cy="120" r="4.5" class="node" />
    <circle cx="100" cy="105" r="4.5" class="node" />
    <circle cx="100" cy="160" r="5" class="node" />
  </g>

  <g transform="translate(250, 0)">
    <text x="0" y="105" class="title">PRISMA</text>
    <text x="0" y="155" class="subtitle">Software</text>
  </g>
</svg>
